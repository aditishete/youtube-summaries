services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=3001
      - POLL_INTERVAL_MINUTES=${POLL_INTERVAL_MINUTES:-30}
    volumes:
      - db_data:/data
    networks:
      - app

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - BACKEND_HOST=backend:3001
    depends_on:
      - backend
    networks:
      - app

volumes:
  db_data:

networks:
  app:
    driver: bridge
