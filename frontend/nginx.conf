server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve upstream at request time so nginx starts even when backend is sleeping
    resolver ${NGINX_RESOLVER} valid=15s;

    # Proxy API requests to the backend (host injected via BACKEND_HOST env var)
    location /api/ {
        set $backend "${BACKEND_HOST}";
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Channel add runs Claude analysis on up to 10 videos — can take several minutes
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
