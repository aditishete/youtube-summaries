# Fly.io config for the backend API
# Deploy with: fly deploy --config backend/fly.toml

app = 'yt-summary-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  POLL_INTERVAL_MINUTES = '30'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'summary_data'
  destination = '/data'
